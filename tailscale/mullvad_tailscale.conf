#!/usr/sbin/nft -f
#
# nftables rules to allow Tailscale and Mullvad VPN to coexist on Linux.
# Marks traffic destined for the Tailscale CGNAT range (100.64.0.0/10) so
# Mullvad's routing ignores it and Tailscale handles it normally.
#
# Source: https://theorangeone.net/posts/tailscale-mullvad/
#
# Usage:
#   Load manually:  sudo nft -f mullvad_tailscale.conf
#   Remove:         sudo nft delete table inet mullvad_tailscale
#   Persist:        add 'include "/etc/nftables/mullvad_tailscale.conf"' to /etc/nftables.conf

table inet mullvad_tailscale {
  chain output {
    type route hook output priority 0; policy accept;
    ip daddr 100.64.0.0/10 ct mark set 0x00000f41 meta mark set 0x6d6f6c65;
  }

  chain input {
    type filter hook input priority -100; policy accept;
    ip saddr 100.64.0.0/10 ct mark set 0x00000f41 meta mark set 0x6d6f6c65;
  }
}
